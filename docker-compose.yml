version: '3.8'

services:
  # ACIS Nervous System (Brain)
  acis-core:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/acis_history.db
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  # High-speed caching and real-time streams
  redis:
    image: redis:6.2-alpine
    ports:
      - "6379:6379"

  # ACIS Digital Twin Dashboard (Fulfillment)
  dashboard:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

networks:
  default:
    name: acis-net
